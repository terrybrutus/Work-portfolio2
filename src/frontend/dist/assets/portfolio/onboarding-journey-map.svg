<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise onboarding journey map</title>
  <desc id="desc">A journey map connecting preboarding, role readiness, field practice, manager support, and performance follow-up.</desc>
  <rect width="1200" height="675" fill="#111315"/>
  <rect x="70" y="60" width="1060" height="555" rx="24" fill="#181d23" stroke="#3d4652" stroke-width="2"/>
  <text x="104" y="128" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Enterprise onboarding journey</text>
  <text x="104" y="168" fill="#a8b3c1" font-family="Arial, sans-serif" font-size="21">Role readiness across lifecycle moments, field execution, and manager support</text>
  <path d="M128 368C250 230 365 492 492 350S742 218 898 372s210-44 232-84" stroke="#d9a441" stroke-width="8" fill="none" stroke-linecap="round"/>
  <g fill="#101827" stroke="#60a5fa" stroke-width="3" font-family="Arial, sans-serif">
    <circle cx="128" cy="368" r="42"/><text x="94" y="448" fill="#cbd5e1" font-size="18">Preboard</text>
    <circle cx="340" cy="372" r="42"/><text x="304" y="452" fill="#cbd5e1" font-size="18">Role path</text>
    <circle cx="552" cy="322" r="42"/><text x="512" y="402" fill="#cbd5e1" font-size="18">Practice</text>
    <circle cx="764" cy="286" r="42"/><text x="718" y="366" fill="#cbd5e1" font-size="18">Manager</text>
    <circle cx="976" cy="354" r="42"/><text x="928" y="434" fill="#cbd5e1" font-size="18">Measure</text>
  </g>
  <text x="104" y="580" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Lifecycle design connects readiness touchpoints to manager support and performance follow-up.</text>
</svg>
