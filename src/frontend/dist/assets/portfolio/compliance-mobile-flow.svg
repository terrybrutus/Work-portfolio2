  <path d="M384 382h104M678 288c64 0 70 88 108 88M678 450c64 0 70-74 108-74" stroke="#d9a441" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="104" y="628" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Designed around accessible completion, evidence capture, and audit readiness.</text>
</svg>
