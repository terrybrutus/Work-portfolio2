<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mobile compliance enablement flow</title>
  <desc id="desc">A mobile-first compliance flow with role access, task completion, evidence tracking, and audit readiness.</desc>
  <rect width="1200" height="675" fill="#0f1115"/>
  <text x="104" y="112" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Mobile-first compliance ecosystem</text>
  <text x="104" y="152" fill="#a8b3c1" font-family="Arial, sans-serif" font-size="21">Low-code access, completion evidence, and audit-ready support without a formal LMS</text>
  <rect x="162" y="206" width="222" height="370" rx="34" fill="#1f2937" stroke="#64748b" stroke-width="4"/>
  <rect x="190" y="258" width="166" height="42" rx="10" fill="#334155"/><rect x="190" y="324" width="166" height="42" rx="10" fill="#334155"/><rect x="190" y="390" width="166" height="42" rx="10" fill="#0f766e"/><rect x="190" y="456" width="166" height="42" rx="10" fill="#334155"/>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="488" y="240" width="190" height="96" rx="18" fill="#18212c" stroke="#38bdf8"/>
    <text x="530" y="296" fill="#f8fafc">Role access</text>
    <rect x="488" y="402" width="190" height="96" rx="18" fill="#18212c" stroke="#f59e0b"/>
    <text x="524" y="458" fill="#f8fafc">Evidence</text>
