<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Instructional design artifact suite</title>
  <desc id="desc">A clean artifact suite showing ADDIE, QA, facilitator guide, job aid, and storyboard documents.</desc>
