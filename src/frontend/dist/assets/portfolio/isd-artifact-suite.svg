    <g><rect x="548" y="230" width="176" height="240" rx="12" fill="#fef3c7"/><rect x="568" y="270" width="136" height="12" fill="#92400e"/><rect x="568" y="304" width="116" height="10" fill="#f59e0b"/><rect x="568" y="332" width="126" height="10" fill="#f59e0b"/><text x="568" y="510" fill="#cbd5e1" font-size="18">Facilitator</text></g>
    <g><rect x="766" y="206" width="176" height="240" rx="12" fill="#dcfce7"/><rect x="786" y="246" width="136" height="12" fill="#166534"/><rect x="786" y="282" width="116" height="10" fill="#22c55e"/><rect x="786" y="310" width="126" height="10" fill="#22c55e"/><text x="786" y="486" fill="#cbd5e1" font-size="18">Job aid</text></g>
