<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Centralized versus decentralized learning module map</title>
  <desc id="desc">A clean visual comparison of centralized and decentralized networks used for a technical learning module.</desc>
  <rect width="1200" height="675" fill="#090d12"/>
  <rect x="72" y="62" width="1056" height="551" rx="30" fill="#101720" stroke="#263344" stroke-width="2"/>
  <text x="118" y="126" fill="#f5f7fb" font-family="Arial, sans-serif" font-size="40" font-weight="700">Centralized vs. Decentralized</text>
  <text x="118" y="166" fill="#a8b3c2" font-family="Arial, sans-serif" font-size="21">Visual explanation module for comparing technical network structures.</text>
  <g transform="translate(180 255)">
    <text x="90" y="-42" fill="#f5f7fb" font-family="Arial, sans-serif" font-size="25" font-weight="700">Centralized</text>
    <circle cx="180" cy="160" r="30" fill="#e5be69"/>
    <g stroke="#5ec8ff" stroke-width="3">
      <line x1="180" y1="160" x2="80" y2="80"/>
      <line x1="180" y1="160" x2="280" y2="80"/>
      <line x1="180" y1="160" x2="60" y2="180"/>
      <line x1="180" y1="160" x2="300" y2="180"/>
      <line x1="180" y1="160" x2="110" y2="270"/>
      <line x1="180" y1="160" x2="250" y2="270"/>
    </g>
    <g fill="#5ec8ff">
      <circle cx="80" cy="80" r="12"/>
      <circle cx="280" cy="80" r="12"/>
      <circle cx="60" cy="180" r="12"/>
      <circle cx="300" cy="180" r="12"/>
      <circle cx="110" cy="270" r="12"/>
      <circle cx="250" cy="270" r="12"/>
    </g>
  </g>
  <g transform="translate(660 255)">
    <text x="72" y="-42" fill="#f5f7fb" font-family="Arial, sans-serif" font-size="25" font-weight="700">Decentralized</text>
    <g stroke="#47d7ac" stroke-width="3">
      <line x1="75" y1="90" x2="190" y2="70"/>
      <line x1="190" y1="70" x2="300" y2="135"/>
      <line x1="300" y1="135" x2="260" y2="250"/>
      <line x1="260" y1="250" x2="120" y2="265"/>
      <line x1="120" y1="265" x2="75" y2="90"/>
      <line x1="120" y1="265" x2="300" y2="135"/>
      <line x1="75" y1="90" x2="260" y2="250"/>
    </g>
    <g fill="#47d7ac">
      <circle cx="75" cy="90" r="14"/>
      <circle cx="190" cy="70" r="14"/>
      <circle cx="300" cy="135" r="14"/>
      <circle cx="260" cy="250" r="14"/>
      <circle cx="120" cy="265" r="14"/>
    </g>
  </g>
  <rect x="118" y="532" width="964" height="48" rx="12" fill="#0b1118" stroke="#263344"/>
  <text x="150" y="563" fill="#a8b3c2" font-family="Arial, sans-serif" font-size="20">Built to make an abstract technical concept easier to compare visually.</text>
</svg>
